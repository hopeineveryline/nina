name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            artifact: nina-linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            artifact: nina-linux-arm64
            runner: ubuntu-latest
          - platform: macos-x64
            target: x86_64-apple-darwin
            artifact: nina-macos-x64
            runner: macos-13
          - platform: macos-arm64
            target: aarch64-apple-darwin
            artifact: nina-macos-arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          echo "CARGO_PROFILE_RELEASE_LTO=true" >> $CARGO_HOME/env
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1" >> $CARGO_HOME/env
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf nina.tar.gz nina
          echo "ASSET=nina.tar.gz" >> $GITHUB_ENV

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ env.ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}