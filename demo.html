<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 720px;
  height: 460px;
  background: #0d0e1a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', 'Menlo', 'Monaco', monospace;
}

.window {
  width: 700px;
  border-radius: 11px;
  overflow: hidden;
  box-shadow: 0 22px 55px rgba(0,0,0,0.75);
  border: 1px solid #1e1f30;
}

.titlebar {
  background: #1c1d2e;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  border-bottom: 1px solid #252638;
}

.dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff8fab; }
.dot.y { background: #ffd6a5; }
.dot.g { background: #b9fbc0; }

.title-text {
  flex: 1;
  text-align: center;
  color: #3a3b55;
  font-size: 12px;
  letter-spacing: 0.2px;
}

.terminal {
  background: #13141f;
  padding: 16px 20px;
  height: 420px;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.62;
  color: #f8efff;
  position: relative;
}

.line { display: block; white-space: pre; }

.shell  { color: #c9bad6; }
.border { color: #3a2f48; }
.title  { color: #ff9ac7; }
.prompt { color: #ff9ac7; }
.text   { color: #f8efff; }
.tag    { color: #ff9ac7; }
.arrow  { color: #c9bad6; }
.mint   { color: #9dffce; }
.lav    { color: #bfa5ff; }
.mute   { color: #c9bad6; }
.rose   { color: #ffb6c1; }
.cursor {
  display: inline-block;
  width: 7px; height: 14px;
  background: #bfa5ff;
  vertical-align: -2px;
  animation: blink 1.1s step-end infinite;
}
.bubble {
  position: absolute;
  right: 18px;
  top: 20px;
  min-width: 112px;
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 12px;
  white-space: pre;
  text-align: center;
  color: #ff9ac7;
  border: 1px solid rgba(191, 165, 255, 0.3);
  border-radius: 15px;
  background: rgba(19, 16, 31, 0.94);
  box-shadow: 0 14px 30px rgba(0,0,0,0.28);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="title-text">nina</div>
  </div>
  <div class="terminal" id="term"></div>
</div>

<script>
const term = document.getElementById('term');
const sleep = ms => new Promise(r => setTimeout(r, ms));

function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text != null) node.textContent = text;
  return node;
}

function line(parts) {
  const row = el('div', 'line');
  for (const part of parts) row.appendChild(el('span', part.cls, part.text));
  return row;
}

function cursor() {
  return el('span', 'cursor');
}

async function typeCommand(command) {
  const rowEl = el('div', 'line');
  const shell = el('span', 'shell', '$ ');
  const cmd = el('span', 'text', '');
  const cur = cursor();
  rowEl.appendChild(shell);
  rowEl.appendChild(cmd);
  rowEl.appendChild(cur);
  term.appendChild(rowEl);

  await sleep(420);
  for (const ch of command) {
    cmd.textContent += ch;
    await sleep(28);
  }
  await sleep(280);
  cur.remove();
}

function bubble(text) {
  const node = el('div', 'bubble', text);
  term.appendChild(node);
  return node;
}

const scenes = [
  {
    command: 'nina help',
    bubble: '(˶ᵔ ᵕ ᵔ˶)',
    doneBubble: '(˶ᵔ ᵕ ᵔ˶)',
    lines: [
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╭───────────────────────────────────────────────────────────╮' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│' }, { cls: 'title', text: ' nina is moving                                           ' }, { cls: 'border', text: '│' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│' }, { cls: 'text', text: " pulling the useful parts forward so they're easy to read." }, { cls: 'border', text: '│' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╰───────────────────────────────────────────────────────────╯' }],
      [{ cls: null, text: '  ' }, { cls: 'prompt', text: 'nina>' }, { cls: 'text', text: ' help' }],
      [{ cls: null, text: '  ' }, { cls: 'tag', text: '[scan]' }, { cls: 'text', text: " i'm gathering the parts worth looking at first." }],
      [{ cls: null, text: '  ' }, { cls: 'arrow', text: '→' }, { cls: 'arrow', text: " i'll keep the output grouped and easy to scan." }],
      [{ cls: 'title', text: '(˶ᵔ ᵕ ᵔ˶)' }, { cls: 'text', text: ' nina command guide ♡' }],
      [{ cls: 'text', text: '  apply     rebuild + switch' }],
      [{ cls: 'text', text: '  hello     meet nina' }],
      [{ cls: 'text', text: '  search    search nixpkgs inline from the prompt' }],
      [{ cls: 'text', text: '  install   add a package to configuration.nix' }],
      [{ cls: null, text: '  ' }, { cls: 'mint', text: '[done]' }, { cls: 'text', text: ' that should feel easier to read now.' }],
      [{ cls: null, text: '  ' }, { cls: 'mute', text: 'elapsed' }, { cls: 'mint', text: '  0ms' }],
    ],
  },
  {
    command: 'nina hello',
    bubble: '(˶ᵔ ᵕ ᵔ˶)',
    doneBubble: '(ง ˙˘˙ )ว',
    lines: [
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╭───────────────────────────────╮' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│' }, { cls: 'title', text: ' nina is moving               ' }, { cls: 'border', text: '│' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│' }, { cls: 'text', text: ' starting with a little hello.' }, { cls: 'border', text: '│' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╰───────────────────────────────╯' }],
      [{ cls: null, text: '  ' }, { cls: 'prompt', text: 'nina>' }, { cls: 'text', text: ' hello' }],
      [{ cls: null, text: '  ' }, { cls: 'tag', text: '[hi]' }, { cls: 'text', text: " i'm finding your machines now." }],
      [{ cls: null, text: '  ' }, { cls: 'arrow', text: '→' }, { cls: 'arrow', text: ' this one should stay light and friendly.' }],
      [{ cls: 'title', text: '(˶ᵔ ᵕ ᵔ˶)' }, { cls: 'text', text: " hi! i'm nina~" }],
      [{ cls: 'mute', text: "i'm your calm little nix helper." }],
      [{ cls: 'mute', text: 'i love declarative systems and calm terminal vibes ♡' }],
      [{ cls: 'mute', text: "i'm managing:" }],
      [{ cls: 'text', text: '  - local (local, default)' }],
      [{ cls: 'title', text: '(ง ˙˘˙ )ว' }, { cls: 'text', text: ' i brought a few kaomoji with me ♡' }],
      [{ cls: null, text: '  ' }, { cls: 'mint', text: '[done]' }, { cls: 'text', text: ' hello all set ♡' }],
    ],
  },
  {
    command: 'nina search ripgrep',
    bubble: '(˶ᵔ ᵕ ᵔ˶)',
    doneBubble: '(｡☌ᴗ☌｡)',
    lines: [
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╭───────────────────────────────────────────────────────────╮' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│' }, { cls: 'title', text: ' nina is moving                                           ' }, { cls: 'border', text: '│' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│' }, { cls: 'text', text: " pulling the useful parts forward so they're easy to read." }, { cls: 'border', text: '│' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╰───────────────────────────────────────────────────────────╯' }],
      [{ cls: null, text: '  ' }, { cls: 'prompt', text: 'nina>' }, { cls: 'text', text: ' search ripgrep' }],
      [{ cls: null, text: '  ' }, { cls: 'tag', text: '[scan]' }, { cls: 'text', text: " i'm gathering the parts worth looking at first." }],
      [{ cls: null, text: '  ' }, { cls: 'arrow', text: '→' }, { cls: 'arrow', text: " i'll keep the output grouped and easy to scan." }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╭──────────────────────────────────────────────╮' }],
      [{ cls: null, text: '  ' }, { cls: 'text', text: '│ 🔍 ripgrep█                          3 results │' }],
      [{ cls: null, text: '  ' }, { cls: 'lav', text: '│   ▸ ripgrep           14.1.0  unknown        │' }],
      [{ cls: null, text: '  ' }, { cls: 'lav', text: '│     ripgrep-all       0.10.0  unknown        │' }],
      [{ cls: null, text: '  ' }, { cls: 'lav', text: '│     ripgrep-fixed     0.1.0   unknown        │' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│ ──────────────────────────────────────────── │' }],
      [{ cls: null, text: '  ' }, { cls: 'text', text: '│ ripgrep · 14.1.0 · unknown · size ?          │' }],
      [{ cls: null, text: '  ' }, { cls: 'mute', text: '│ recursively searches the current directory…  │' }],
      [{ cls: null, text: '  ' }, { cls: 'mute', text: '│ homepage   https://github.com/BurntSushi/…   │' }],
      [{ cls: null, text: '  ' }, { cls: 'text', text: '│ install    ripgrep                           │' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '│ ──────────────────────────────────────────── │' }],
      [{ cls: null, text: '  ' }, { cls: 'mute', text: '│ [i] install [t] try [c] copy [↑↓] [esc] exit │' }],
      [{ cls: null, text: '  ' }, { cls: 'border', text: '╰──────────────────────────────────────────────╯' }],
    ],
  },
];

async function renderScene(scene) {
  term.innerHTML = '';
  const box = bubble(scene.bubble);
  await typeCommand(scene.command);
  await sleep(180);
  for (const parts of scene.lines) {
    term.appendChild(line(parts));
    await sleep(110);
  }
  box.textContent = scene.doneBubble;
  await sleep(2000);
}

async function play() {
  while (true) {
    for (const scene of scenes) {
      await renderScene(scene);
    }
  }
}

play();
</script>
</body>
</html>
